site_name: Skirnir
repo_url: https://github.com/Skirnir/Skirnir
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Lifetimes: lifetimes.md
  - Usage:
      - Concrete Type: usage/concrete-type.md
      - Interface/Contract: usage/interface-contract.md
      - Injection: usage/injection.md
      - Logging: usage/logging.md
  - API Reference: api-reference.md